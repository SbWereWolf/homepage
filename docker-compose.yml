services:
  nginx:
    image: valian/docker-nginx-auto-ssl
    restart: unless-stopped

    mem_limit: 300m
    cpus: "0.50"

    # Важно: используем 127.0.0.1 вместо localhost, чтобы не упираться в IPv6 (::1) и ложные "Connection refused"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --header='Host: kv1.me' http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

    environment:
      ALLOWED_DOMAINS: 'kv1.me'

    volumes:
      - ssl_data:/etc/resty-auto-ssl
      - ./www:/var/www
      - ./fs/etc/nginx/conf.d/kv1.me.conf:/etc/nginx/conf.d/kv1.me.conf

    ports:
      - 80:80
      - 443:443

volumes:
  ssl_data:
